<!DOCTYPE html><html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Juction - Latest Jobs & Exam Prep</title><style>
:root{
  --blue:#061b55;
  --blue2:#0b5ed7;
  --yellow:#ffd21f;
  --bg:#f6f8fc;
  --white:#ffffff;
  --text:#07122f;
  --muted:#6b7280;
  --border:#e5eaf3;
  --green:#18a058;
  --red:#ef4444;
  --purple:#7c3aed;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
}

a{
  text-decoration:none;
  color:inherit;
}

button{
  cursor:pointer;
  border:none;
}

.topbar{
  height:70px;
  background:linear-gradient(90deg,#06133c,#082c75);
  color:white;
  display:flex;
  align-items:center;
  gap:25px;
  padding:0 28px;
  position:sticky;
  top:0;
  z-index:100;
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
  min-width:280px;
}

.logoBox{
  width:48px;
  height:48px;
  border-radius:14px;
  background:white;
  color:var(--blue);
  display:grid;
  place-items:center;
  font-size:26px;
  font-weight:900;
}

.brand h1{
  font-size:24px;
  line-height:1;
}

.brand p{
  font-size:13px;
  margin-top:5px;
  opacity:.9;
}

.searchBox{
  flex:1;
  display:flex;
  background:white;
  border-radius:10px;
  overflow:hidden;
  max-width:560px;
}

.searchBox input{
  flex:1;
  border:none;
  outline:none;
  padding:14px 15px;
  font-size:15px;
}

.searchBox button{
  width:52px;
  background:white;
  font-size:22px;
}

.userArea{
  margin-left:auto;
  display:flex;
  align-items:center;
  gap:14px;
}

.avatar{
  width:48px;
  height:48px;
  border-radius:50%;
  background:#eef2ff;
  color:#071952;
  display:grid;
  place-items:center;
  font-size:24px;
}

.layout{
  display:grid;
  grid-template-columns:220px 1fr 330px;
  gap:24px;
  padding:18px;
}

.sidebar{
  position:sticky;
  top:88px;
  height:calc(100vh - 100px);
  overflow:auto;
}

.sideLink{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 14px;
  border-radius:9px;
  margin-bottom:5px;
  font-weight:700;
  font-size:15px;
}

.sideLink.active{
  background:#082d78;
  color:white;
}

.premium{
  margin-top:24px;
  background:linear-gradient(140deg,#fff3d2,#fff);
  border:1px solid #ffe2a0;
  border-radius:14px;
  padding:17px;
}

.premium h3{
  font-size:18px;
}

.premium p{
  font-size:13px;
  margin:10px 0;
  color:#172554;
  line-height:1.5;
}

.premium button{
  width:100%;
  padding:12px;
  background:#082d78;
  color:white;
  border-radius:8px;
  font-weight:800;
}
